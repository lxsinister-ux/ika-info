<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruangan Random Ika 💥</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('bg-emo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            min-height: 100vh;
            margin: 0;
            color: #e0e0e0;
        }

        .container {
            background-color: rgba(26, 26, 30, 0.95);
            border: 1px solid #2d2d34;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            text-align: center;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            color: #f5f5f5;
            margin-top: 0;
        }

        p {
            color: #c0c0c0;
            line-height: 1.7;
        }

        .btn-back {
            display: inline-block;
            background-color: #a6192e;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(166, 25, 46, 0.25);
        }

        .btn-back:hover {
            background-color: #851222;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💥 Ruangan Random Suka-Suka Gue 💥</h1>
        <p>Selamat datang di tempat pembuangan hal random! Isinya bakal di-update tiap kali gue gabut wkwkwk.</p>
        
        <p><i>[Sore ini menunya rebahan di kasur sambil dengerin OST Resident Evil...]</i></p>

        <br>
        <a href="index.html" class="btn-back">← Balik ke Menu Utama</a>
    </div>
</body>
</html>
